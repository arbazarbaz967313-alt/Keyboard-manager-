workflows:
  android-workflow:
    name: Quick Clipboard Manager
    max_build_duration: 60
    instance_type: linux

    scripts:
      - echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - chmod +x gradlew
      - ./gradlew clean
      - ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
